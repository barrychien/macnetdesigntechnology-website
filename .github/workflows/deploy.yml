name: Deploy to GitHub Pageson:  push:    branches:      - main  workflow_dispatch:permissions:  contents: write  pages: write  id-token: writeconcurrency:  group: "pages"  cancel-in-progress: falsejobs:  build:    runs-on: ubuntu-latest    steps:      - name: Checkout        uses: actions/checkout@v4      - name: Setup pnpm        uses: pnpm/action-setup@v3        with:          version: 10      - name: Setup Node.js        uses: actions/setup-node@v4        with:          node-version: '22'          cache: 'pnpm'      - name: Install dependencies        run: pnpm install --frozen-lockfile      - name: Build        run: pnpm run build      - name: Deploy to GitHub Pages        uses: peaceiris/actions-gh-pages@v3        with:          github_token: ${{ secrets.GITHUB_TOKEN }}          publish_dir: ./dist/public
