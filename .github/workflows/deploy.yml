name: Deploy to GitHub Pages
















on:
  push:
    branches:
      - main
  workflow_dispatch:
















permissions:
  contents: read
  pages: write
  id-token: write
















concurrency:
  group: "pages"
  cancel-in-progress: false
















jobs:
  build:
    runs-on: ubuntu-latest
  environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4
















      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10


