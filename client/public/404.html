<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Page Not Found</title>
  <script>
    // GitHub Pages SPA routing fix
    // When a user navigates to a non-existent URL, GitHub Pages returns 404.html
    // This script redirects to index.html while preserving the original path
    const path = window.location.pathname;
    const basePath = '/macnetdesigntechnology-website';
    
    // Only redirect if we're in the correct base path
    if (path.startsWith(basePath)) {
      // Store the redirect path in sessionStorage
      const redirectPath = path.substring(basePath.length) || '/';
      sessionStorage.redirect = window.location.protocol + '//' + window.location.host + basePath + '/#' + redirectPath;
      // Redirect to index.html
      window.location.href = basePath + '/';
    }
  </script>
</head>
<body>
</body>
</html>
